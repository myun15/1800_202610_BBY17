<!doctype html>
<html lang="en">
  <head>
    <title>TeamBBY</title>
    <meta name="BBY Team 17 template" content="TimesUp App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- our own navbar goes here -->
    <site-navbar></site-navbar>

    <!-- Main content goes here -->

    <h1 id="restaurantName">Loading...</h1>
    <img id="restaurantImage" class="img-fluid rounded mt-3" src="" alt="Restaurant image">
</main> -->

    <!-- Main content -->
    <main class="container py-4">
      <div class="row">
        <div class="col-lg-8 mx-auto">
          <h1 id="restaurantName" class="mb-4">Loading...</h1>
          <img
            id="restaurantImage"
            class="img-fluid rounded shadow-sm mb-4"
            src=""
            alt="Restaurant image"
            style="max-height: 400px; width: 100%; object-fit: cover"
          />
          <div id="restaurantDetails" class="mt-4">
            <div class="text-center">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading details...</span>
              </div>
              <p class="mt-2">Loading restaurant details...</p>
            </div>
          </div>
          <a href="home.html" class="btn btn-secondary mt-4"
            >← Back to Restaurants</a
          >
        </div>
      </div>
    </main>

    <!-- our own footer goes here -->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/pages/restaurant-detail.js"></script>
