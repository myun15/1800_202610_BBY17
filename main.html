<head>
  <title>TeamBBY</title>
  <meta name="comp1800 template" content="My 1800 App" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script type="module" src="/src/components/site-navbar.js"></script>
  <script type="module" src="/src/components/site-footer.js"></script>

  <style>
    /* Map preview */
    #map-preview {
      width: 100%;
      height: 400px;
      margin-top: 20px;
      border-radius: 12px;
      background-color: #b0b0b0;
      position: relative; /* for pins */
    }

    /* Pins */
    .restaurant-pin {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
      position: absolute;
      cursor: pointer;
    }

    /* Color codes for status */
    .green { background-color: green; }
    .orange { background-color: orange; }
    .red { background-color: red; }

    /* Popup */
    #popup {
      position: absolute;
      background-color: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.3);
      display: none;
      z-index: 10;
      width: 150px;
    }

    #popup button {
      margin-top: 5px;
      padding: 2px 6px;
      border: none;
      background-color: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

    <!-- Main Content -->
    <div
      class="hero-area d-flex justify-content-center flex-column h-90vh px-5"
    >
      <h1 id="welcome-user" class="display-5 fw-bold pb-4 text-white"></h1>
      <h1 class="display-5 fw-bold pb-4 text-white">
        Restaurant wait-lists near you
      </h1>
      <div class="d-flex gap-2">
        <input
          type="text"
          class="address-input form-control py-3"
          placeholder="Enter address"
        />
        <button class="search-button btn btn-danger">Search</button>
        <button
          class="btn btn-success"
          onclick="window.location.href = 'map.html'"
        >
          Map
        </button>
      </div>
    </div>

    <!-- Map Placeholder with pins -->
    <div id="map-preview">
      <div class="restaurant-pin green" data-name="Sushi Town" data-status="Busy" data-rating="4.5"
        style="top:50px; left:80px;"></div>
      <div class="restaurant-pin orange" data-name="Burger King" data-status="Empty" data-rating="3.8"
        style="top:120px; left:200px;"></div>
      <div class="restaurant-pin red" data-name="McDonalds" data-status="Full" data-rating="4.0"
        style="top:250px; left:150px;"></div>
    </div>

    <!-- Popup -->
    <div id="popup">
      <h5 id="popup-name"></h5>
      <p>Status: <span id="popup-status"></span></p>
      <p>Rating: <span id="popup-rating"></span> ⭐</p>
      <button onclick="closePopup()">Close</button>
    </div>

  </div>

    <site-footer></site-footer>

  <script>
    // Popup JS
    const pins = document.querySelectorAll(".restaurant-pin");
    const popup = document.getElementById("popup");
    const popupName = document.getElementById("popup-name");
    const popupStatus = document.getElementById("popup-status");
    const popupRating = document.getElementById("popup-rating");

    pins.forEach(pin => {
      pin.addEventListener("click", () => {
        popupName.textContent = pin.dataset.name;
        popupStatus.textContent = pin.dataset.status;
        popupRating.textContent = pin.dataset.rating;

        // position popup near the pin
        popup.style.left = parseInt(pin.style.left) + 25 + "px";
        popup.style.top = parseInt(pin.style.top) + "px";

        popup.style.display = "block";
      });
    });

    function closePopup() {
      popup.style.display = "none";
    }
  </script>

  
  <script type="module" src="/src/app.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
