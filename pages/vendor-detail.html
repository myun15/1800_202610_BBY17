<!doctype html>
<html lang="en">
  <head>
    <title>Times Up</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
    <script type="module" src="/src/styles/style.css"></script>
  </head>

  <body>
    <site-navbar></site-navbar>

    <main class="container py-4 restaurant-detail-page">
      <div class="row">
        <div class="col-lg-8 mx-auto">
          <a
            href="/pages/featuredRestaurants.html"
            class="btn btn-secondary mb-3"
            >← Back to Featured Vendor</a
          >

          <img
            id="restaurantImage"
            class="img-fluid rounded shadow-sm mb-4 restaurant-detail-image"
            src=""
            alt="Restaurant image"
          />

          <h1 id="restaurantName" class="mb-2">Loading...</h1>
          <p id="restaurantMeta" class="text-muted mb-2"></p>
          <div id="restaurantStatus" class="mb-4"></div>

          <div id="restaurantDetails">
            <div class="text-center">
              <p class="mt-2">Loading restaurant details...</p>
            </div>
          </div>
          <a href="/index.html" class="btn btn-secondary mt-4"
            >← Back to Restaurants</a
          >
        </div>
      </div>
    </main>

    <site-footer></site-footer>

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/pages/vendor-detail.js"></script>
